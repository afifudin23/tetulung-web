<title>Tetulung — Beranda (Mobile)</title>
<style>
  :root {
    /* Tetulung tokens (from DESIGN_RULES.md) */
    --primary: #2563e0;
    --primary-dark: #1d4fc4;
    --primary-light: #4079e2;
    --teal: #02a69c;
    --teal-light: #08b5aa;
    --navy: #14355c;
    --text: #48586e;
    --muted: #6b7a90;
    --border: #e5ecf6;
    --card: #ffffff;
    --amber: #f59e0b;

    --screen-bg-top: #eef3fb;
    --screen-bg-bottom: #e6eefa;

    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 26px;
    --radius-pill: 999px;

    --font: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system,
      "Segoe UI", Roboto, sans-serif;

    /* backdrop (theme-aware) */
    --stage: #d7e2f2;
    --stage-2: #c6d5ec;
    --stage-ink: #55647c;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --stage: #0c1626;
      --stage-2: #0a1a2f;
      --stage-ink: #8298b6;
    }
  }
  :root[data-theme="dark"] {
    --stage: #0c1626;
    --stage-2: #0a1a2f;
    --stage-ink: #8298b6;
  }
  :root[data-theme="light"] {
    --stage: #d7e2f2;
    --stage-2: #c6d5ec;
    --stage-ink: #55647c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font);
    background:
      radial-gradient(120% 90% at 50% 0%, var(--stage) 0%, var(--stage-2) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 40px 16px 56px;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
  }

  .stage-label {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stage-ink);
  }

  /* ---------- Phone frame ---------- */
  .phone {
    width: 380px;
    max-width: 100%;
    background: #0b1220;
    border-radius: 46px;
    padding: 12px;
    box-shadow:
      0 2px 4px rgba(9, 20, 40, 0.4),
      0 30px 70px rgba(9, 20, 40, 0.38);
  }

  .screen {
    position: relative;
    border-radius: 36px;
    overflow: hidden;
    background: linear-gradient(180deg, var(--screen-bg-top), var(--screen-bg-bottom));
    height: 800px;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Status bar ---------- */
  .statusbar {
    flex-shrink: 0;
    height: 44px;
    padding: 0 22px 0 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
  }
  .statusbar .sys { display: flex; align-items: center; gap: 6px; }
  .statusbar .sys svg { width: 16px; height: 16px; }
  .battery {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 800;
  }
  .battery .cell {
    width: 22px; height: 12px; border-radius: 3px;
    border: 1.6px solid var(--navy); padding: 1.5px; display: inline-flex;
  }
  .battery .cell::before {
    content: ""; width: 77%; background: var(--navy); border-radius: 1px;
  }

  /* ---------- Scroll body ---------- */
  .body {
    flex: 1;
    overflow-y: auto;
    padding: 6px 20px 20px;
    scrollbar-width: none;
  }
  .body::-webkit-scrollbar { display: none; }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .greet { font-size: 15px; color: var(--muted); font-weight: 500; }
  .name { font-size: 30px; font-weight: 800; color: var(--navy); margin-top: 2px; }
  .header-actions { display: flex; align-items: center; gap: 12px; padding-top: 6px; }
  .bell {
    position: relative;
    width: 48px; height: 48px; border-radius: var(--radius-md);
    background: #fff; display: grid; place-items: center;
    box-shadow: 0 2px 8px rgba(20, 53, 92, 0.08);
    border: none; cursor: pointer; color: var(--navy);
  }
  .bell svg { width: 22px; height: 22px; }
  .bell .dot {
    position: absolute; top: 11px; right: 12px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--teal); border: 2px solid #fff;
  }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(180deg, var(--primary-light), var(--primary));
    color: #fff; display: grid; place-items: center;
    font-weight: 800; font-size: 18px;
    box-shadow: 0 4px 12px rgba(37, 99, 224, 0.35);
  }

  /* ---------- Search ---------- */
  .search {
    display: flex; align-items: center; gap: 12px;
    background: #fff; border-radius: var(--radius-md);
    padding: 15px 18px; margin-bottom: 18px;
    box-shadow: 0 4px 14px rgba(20, 53, 92, 0.06);
  }
  .search svg { width: 20px; height: 20px; color: var(--muted); flex-shrink: 0; }
  .search input {
    border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 15px; color: var(--text); width: 100%;
  }
  .search input::placeholder { color: var(--muted); }

  /* ---------- Dual action cards ---------- */
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .action {
    border-radius: var(--radius-lg);
    padding: 18px 16px 20px;
    color: #fff; cursor: pointer; border: none; text-align: left;
    font-family: inherit;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .action:active { transform: scale(0.97); }
  .action.blue {
    background: linear-gradient(160deg, var(--primary-light), var(--primary-dark));
    box-shadow: 0 10px 22px rgba(37, 99, 224, 0.32);
  }
  .action.teal {
    background: linear-gradient(160deg, var(--teal-light), var(--teal));
    box-shadow: 0 10px 22px rgba(2, 166, 156, 0.32);
  }
  .action .ic {
    width: 46px; height: 46px; border-radius: 13px;
    background: rgba(255, 255, 255, 0.22);
    display: grid; place-items: center; margin-bottom: 26px;
  }
  .action .ic svg { width: 24px; height: 24px; }
  .action h3 { margin: 0 0 6px; font-size: 20px; font-weight: 800; }
  .action p { margin: 0; font-size: 13.5px; line-height: 1.35; color: rgba(255, 255, 255, 0.92); }

  /* ---------- Dev status banner ---------- */
  .banner {
    display: flex; gap: 14px; align-items: flex-start;
    background: #fdf3e0; border: 1px solid #f6e2bd;
    border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 26px;
  }
  .banner .ic {
    width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
    background: #fbe6bb; color: var(--amber); display: grid; place-items: center;
  }
  .banner .ic svg { width: 20px; height: 20px; }
  .banner h4 { margin: 0 0 3px; font-size: 15px; font-weight: 800; color: var(--navy); }
  .banner p { margin: 0; font-size: 13.5px; line-height: 1.4; color: var(--muted); }

  /* ---------- Section heading ---------- */
  .sec-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 0 2px 16px;
  }
  .sec-head h2 { margin: 0; font-size: 21px; font-weight: 800; color: var(--navy); }
  .sec-head h2 .hl { color: var(--primary); }
  .see-all { font-size: 14px; font-weight: 800; color: var(--primary); cursor: pointer; }

  /* ---------- Service grid ---------- */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
  .svc {
    background: #fff; border-radius: var(--radius-md);
    padding: 18px 8px 15px; display: flex; flex-direction: column;
    align-items: center; gap: 12px; cursor: pointer; border: none;
    font-family: inherit;
    box-shadow: 0 3px 10px rgba(20, 53, 92, 0.05);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .svc:active { transform: translateY(2px); box-shadow: 0 1px 5px rgba(20, 53, 92, 0.05); }
  .svc .circle {
    width: 58px; height: 58px; border-radius: 50%;
    display: grid; place-items: center;
  }
  .svc .circle svg { width: 26px; height: 26px; }
  .svc span { font-size: 13.5px; font-weight: 700; color: var(--navy); }

  /* peeking history card */
  .history-peek {
    background: #fff; border-radius: var(--radius-md);
    height: 84px; box-shadow: 0 3px 10px rgba(20, 53, 92, 0.05);
    display: flex; align-items: center; gap: 14px; padding: 0 18px;
  }
  .history-peek .ph { width: 46px; height: 46px; border-radius: 12px; background: #e7f0fd; flex-shrink: 0; }
  .history-peek .lines { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .history-peek .lines i { height: 9px; border-radius: 5px; background: #eef2f8; display: block; }
  .history-peek .lines i:first-child { width: 55%; }
  .history-peek .lines i:last-child { width: 32%; background: #f2f5fa; }

  /* ---------- Bottom nav ---------- */
  .tabbar {
    flex-shrink: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(4, 1fr);
    padding: 10px 8px 20px;
  }
  .tab {
    background: none; border: none; cursor: pointer; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    color: var(--muted); font-size: 12px; font-weight: 700;
    position: relative; padding-top: 6px;
  }
  .tab svg { width: 23px; height: 23px; }
  .tab.active { color: var(--primary); }
  .tab.active::before {
    content: ""; position: absolute; top: -10px;
    width: 34px; height: 3px; border-radius: 3px; background: var(--primary);
  }

  @media (max-width: 420px) {
    body { padding: 20px 0 30px; }
    .phone { border-radius: 0; padding: 0; box-shadow: none; width: 100%; }
    .screen { border-radius: 0; height: 100vh; }
    .stage-label { display: none; }
  }
</style>

<script>
  // Bottom-nav active state
  const tabs = document.querySelectorAll(".tab");
  tabs.forEach((t) => {
    t.addEventListener("click", () => {
      tabs.forEach((x) => x.classList.remove("active"));
      t.classList.add("active");
    });
  });
</script>
